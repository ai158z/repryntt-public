name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures.json"
          path-to-document: "https://github.com/ai158z/repryntt-public/blob/main/CLA.md"
          branch: "main"
          allowlist: "repryntt,dependabot[bot],github-actions[bot]"
          custom-notsigned-comment: >
            Thanks for the contribution! Before we can merge, please read our
            [Contributor License Agreement](https://github.com/ai158z/repryntt-public/blob/main/CLA.md)
            and sign by commenting the sentence below. You keep full rights to
            your code — the CLA lets the project steward its licensing.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-comment: "✅ All contributors have signed the CLA."
