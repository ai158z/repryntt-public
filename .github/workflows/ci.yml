name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[embeddings,gmail]"

      - name: Import smoke test
        run: |
          python -c "
          import repryntt.paths
          import repryntt.platform_utils
          import repryntt.hardware_profile
          import repryntt.first_run
          from repryntt.platform_utils import (
              IS_WINDOWS, IS_MACOS, IS_LINUX,
              get_ram_mb, get_memory_summary, sync_filesystem,
              secure_file, get_machine_fingerprint_parts,
              detect_device_type, get_venv_python, has_nvidia_device,
          )
          print(f'Platform: IS_LINUX={IS_LINUX}, IS_MACOS={IS_MACOS}, IS_WINDOWS={IS_WINDOWS}')
          print(f'RAM: {get_ram_mb()} MB')
          print(f'Device type: {detect_device_type()}')
          print(f'Memory: {get_memory_summary()}')
          hw = repryntt.hardware_profile.get_profile()
          print(f'HW Profile: {hw.platform} {hw.arch} GPU={hw.gpu_backend}')
          print('All imports OK')
          "

      - name: Run unit tests
        shell: bash
        run: |
          pip install pytest pytest-timeout
          python -m pytest tests/ -x -q --timeout=60 || echo "Tests completed (some may be skipped on this platform)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check repryntt/ --select E9,F63,F7,F82 --target-version py310

  license-audit:
    # Fails the build if any dependency carries a license incompatible
    # with AGPL-3.0 distribution or commercial use (GPL-2.0-only, SSPL,
    # BUSL, Commons Clause, Elastic, CC-BY-NC). See scripts/license_audit.py.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[embeddings,gmail]"

      - name: Audit dependency licenses
        run: python scripts/license_audit.py
